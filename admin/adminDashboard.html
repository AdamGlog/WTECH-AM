<!doctype html>
<html lang="sk">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Prehľad admina</title>
        <link rel="icon" type="image/x-icon" href="../resources/NoraLogo.svg">
        <!-- CSS z Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="../styles.css" rel="stylesheet">
    </head>
    <body>
    <!--Top bar Stranky-->
    <div class="container">
        <div class="row align-items-center g-1">
            <div class="col-auto">
                <img src="../resources/NoraLogo.svg" class="top-logo">
            </div>
            <div class="col search-area">
                <input class="form-control me-2" type="search" placeholder="Search..." aria-label="Search"/>   
            </div>
            <div class="col-auto">
                <button class="btn btn-outline-success our-buttons top-bar-sizes" type="submit">
                    <img src="../resources/search.svg" class="top-bar-icons">
                </button>
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-secondary our-buttons top-bar-sizes">
                    <img src="../resources/profile.svg" class="top-bar-icons">
                </button>
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-secondary our-buttons top-bar-sizes">
                    <img src="../resources/ShopCart.svg" class="top-bar-icons">
                </button>
            </div>    
        </div>
    </div>
    
    <!-- Menu Profilu -->
    <div class="container">
        <div class="row g-0 flex-nowrap">
            <div class="col">
                <div class="d-grid menu-button-left" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons our-buttons profile-menu-buttons pe-2">Prehľad Účtu</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons our-buttons profile-menu-buttons">Objednávky</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons our-buttons profile-menu-buttons">Obľúbené</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons our-buttons profile-menu-buttons">Údaje</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid menu-button" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons-last our-buttons profile-menu-buttons">Súkromie</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid menu-button" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons-last our-buttons profile-menu-buttons">Admin</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid menu-button-right" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-danger our-buttons-logout profile-menu-buttons">Odhlásiť</button>
                </div>
            </div>  
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div class="container">
        <h2 class="heading main-headings text-center px-0 mt-4 my-3">Vitaj Admin!</h2>
        <div class="row g-3">
            <div class="col-12 col-md-4">
                <div class="card text-center border-secondary">
                    <div class="card-body smaller-text">
                        <h2 class="card-title fw-bold">999</h2>
                        <p class="card-text text-muted">Objednávok dnes</p>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card text-center border-secondary">
                    <div class="card-body smaller-text">
                        <h2 class="card-title fw-bold">100</h2>
                        <p class="card-text text-muted">Aktívnych užívateľov</p>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card text-center border-secondary">
                    <div class="card-body smaller-text">
                        <h2 class="card-title fw-bold">5</h2>
                        <p class="card-text text-muted">Nových užívateľov dnes</p>
                    </div>
                </div>
            </div>
        </div>
        <h3 class="heading main-headings text-center px-0 pt-3">Nástroje</h3>
        <div class="row text-center">
            <div class="col d-flex flex-column align-items-center smaller-text">
                <a type="button" href="./adminProducts.html" class="btn btn-secondary our-buttons my-2 admin-dasboard-buttons">
                    <img src="../resources/InventoryWhite.svg" class="admin-dasboard-buttons-icons icon-white"/>
                    <img src="../resources/InventoryBlack.svg" class="admin-dasboard-buttons-icons icon-black"/>
                    Správa Produktov
                </a>
                <a type="button" href="./adminCategories.html" class="btn btn-secondary our-buttons my-2 admin-dasboard-buttons">
                    <img src="../resources/FolderWhite.svg" class="admin-dasboard-buttons-icons icon-white"/>
                    <img src="../resources/FolderBlack.svg" class="admin-dasboard-buttons-icons icon-black"/>
                    Správa Kategórií
                </a>
                <a type="button" href="./adminUsers.html" class="btn btn-secondary our-buttons my-2 admin-dasboard-buttons">
                    <img src="../resources/UserListWhite.svg" class="admin-dasboard-buttons-icons icon-white"/>
                    <img src="../resources/UserListBlack.svg" class="admin-dasboard-buttons-icons icon-black"/>
                    Správa Užívateľov
                </a>
                <a type="button" href="./adminOrders.html" class="btn btn-secondary our-buttons my-2 admin-dasboard-buttons">
                    <img src="../resources/OrderWhite.svg" class="admin-dasboard-buttons-icons icon-white"/>
                    <img src="../resources/OrderBlack.svg" class="admin-dasboard-buttons-icons icon-black"/>
                    Správa Objednávok
                </a>
            </div>
        </div>
    </div>
    
    <!-- Paticka -->
    <div class="container">
        <hr class="border-dark border-2 opacity-100 my-0 mt-3"/>
        <div class="paticka">
            <div class="container text-center">
                <div class="row">
                    <div class="col-12 col-md-8">
                        <div class="row">
                            <div class="col-6 col-md-4">
                                <p>Reklamácie</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Možnosti dopravy</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>O nás</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Záruky</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Zmluvné podmienky</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Kontakt</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-4 mt-3 mt-md-0">
                        Adresa
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- JS z Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
