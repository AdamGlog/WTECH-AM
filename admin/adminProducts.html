<!doctype html>
<html lang="sk">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Nora</title>
        <!-- CSS z Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="../styles.css" rel="stylesheet">
    </head>
  <body>
    <!--Top bar Stranky-->
    <div class="container">
        <div class="row align-items-center g-1">
            <div class="col-auto">
                <img src="../resources/NoraLogo.svg" class="top-logo">
            </div>
            <div class="col search-area">
                <input class="form-control me-2" type="search" placeholder="Search..." aria-label="Search"/>   
            </div>
            <div class="col-auto">
                <button class="btn btn-outline-success our-buttons top-bar-sizes" type="submit">
                    <img src="../resources/search.svg" class="top-bar-icons">
                </button>
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-secondary our-buttons top-bar-sizes">
                    <img src="../resources/profile.svg" class="top-bar-icons">
                </button>
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-secondary our-buttons top-bar-sizes">
                    <img src="../resources/ShopCart.svg" class="top-bar-icons">
                </button>
            </div>    
        </div>
    </div>

    <!-- Menu Profilu -->
    <div class="container">
        <div class="row g-0 flex-nowrap">
            <div class="col">
                <div class="d-grid menu-button-left" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons our-buttons profile-menu-buttons pe-2">Prehľad Účtu</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons our-buttons profile-menu-buttons">Objednávky</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons our-buttons profile-menu-buttons">Obľúbené</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons our-buttons profile-menu-buttons">Údaje</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid menu-button" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons-last our-buttons profile-menu-buttons">Súkromie</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid menu-button" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons-last our-buttons profile-menu-buttons">Admin</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid menu-button-right" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-danger our-buttons-logout profile-menu-buttons">Odhlásiť</button>
                </div>
            </div>  
        </div>
    </div>


    <!-- Zoznam Produktov -->
    <div class="container">
        <div class="row mt-2">
            <div class="col text-start">
                <h3 class="heading pt-2 ps-2 ms-1 main-headings">Prehľad Produktov</h3>
            </div>
            <div class="col text-end">
                <button type="button" class="btn btn-success create-button">Vytvoriť nový produkt</button>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered text-center align-middle smallest-text">
                <thead class="table-secondary">
                    <tr>
                        <th>Obrázok</th>
                        <th>ID produktu</th>
                        <th>Názov</th>
                        <th>Kategória</th>
                        <th>Cena</th>
                        <th>Skladom</th>
                        <th>Funkcie</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><img src="../resources/TheWichter.jpg" class="order-img"></td>
                        <td>1001</td>
                        <td>The Wichter: The Legend of Regalt</td>
                        <td>Hry</td>
                        <td>49,99€</td>
                        <td>12</td>
                        <td class="d-flex justify-content-center">
                            <button type="button" class="btn btn-primary table-function-buttons">
                                <img src="../resources/EditWhite.svg" class="table-function-buttons-icons"/>
                            </button>
                            <button type="button" class="btn btn-danger table-function-buttons">
                                <img src="../resources/DeleteWhite.svg" class="table-function-buttons-icons"/>
                            </button>
                        </td>
                    </tr>
                    <tr>
                        <td><img src="../resources/PS7.jpg" class="order-img"></td>
                        <td>1002</td>
                        <td>Play State 7</td>
                        <td>Konzoly</td>
                        <td>499,99€</td>
                        <td>3</td>
                        <td class="d-flex justify-content-center">
                            <button type="button" class="btn btn-primary table-function-buttons">
                                <img src="../resources/EditWhite.svg" class="table-function-buttons-icons"/>
                            </button>
                            <button type="button" class="btn btn-danger table-function-buttons">
                                <img src="../resources/DeleteWhite.svg" class="table-function-buttons-icons"/>
                            </button>
                        </td>
                    </tr>
                    <tr>
                        <td><img src="../resources/trickoWichter.png" class="order-img"></td>
                        <td>1003</td>
                        <td>Tričko The Wichter</td>
                        <td>Merch</td>
                        <td>19,99€</td>
                        <td>30</td>
                        <td class="d-flex justify-content-center">
                            <button type="button" class="btn btn-primary table-function-buttons">
                                <img src="../resources/EditWhite.svg" class="table-function-buttons-icons"/>
                            </button>
                            <button type="button" class="btn btn-danger table-function-buttons">
                                <img src="../resources/DeleteWhite.svg" class="table-function-buttons-icons"/>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    
    <!-- Paticka -->
    <div class="container">
        <hr class="border-dark border-2 opacity-100 my-0 mt-3"/>
        <div class="paticka">
            <div class="container text-center">
                <div class="row">
                    <div class="col-12 col-md-8">
                        <div class="row">
                            <div class="col-6 col-md-4">
                                <p>Reklamácie</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Možnosti dopravy</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>O nás</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Záruky</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Zmluvné podmienky</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Kontakt</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-4 mt-3 mt-md-0">
                        Adresa
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- JS z Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
