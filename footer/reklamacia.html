<!doctype html>
<html lang="sk">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Reklamácie</title>
        <link rel="icon" type="image/x-icon" href="../resources/NoraLogo.svg">
        <!-- CSS z Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="../styles.css" rel="stylesheet">
    </head>
    <body>
    <!--Top bar Stranky-->
    <div class="container">
        <div class="row align-items-center g-1">
            <div class="col-auto">
                <img src="../resources/NoraLogo.svg" class="top-logo">
            </div>
            <div class="col search-area">
                <input class="form-control me-2" type="search" placeholder="Search..." aria-label="Search"/>   
            </div>
            <div class="col-auto">
                <button class="btn btn-outline-success our-buttons top-bar-sizes" type="submit">
                    <img src="../resources/search.svg" class="top-bar-icons">
                </button>
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-secondary our-buttons top-bar-sizes" data-bs-toggle="modal" data-bs-target="#profil">
                    <img src="../resources/profile.svg" class="top-bar-icons">
                </button>
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-secondary our-buttons top-bar-sizes">
                    <img src="../resources/ShopCart.svg" class="top-bar-icons">
                </button>
            </div>    
        </div>
    </div>

    <!--Menu kategorii-->
    <div class="container">
        <div class="row g-0">
            <div class="col">
                <div class="d-grid menu-button-left" role="group" aria-label="Basic example">
                <button id="first-menu-button" type="button" class="btn btn-secondary menu-buttons our-buttons">Hry</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                <button type="button" class="btn btn-secondary menu-buttons our-buttons">Konzoly</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                <button type="button" class="btn btn-secondary menu-buttons our-buttons">Merch</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                <button type="button" class="btn btn-secondary menu-buttons our-buttons">Figúrky</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid menu-button-right" role="group" aria-label="Basic example">
                <button id="last-menu-button" type="button" class="btn btn-secondary menu-buttons-last our-buttons">O Nás</button>
                </div>
            </div>    
        </div>
    </div>

    <!-- Modálne okno - Prihlásenie -->
    <div class="modal fade" id="profil" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">Prihlásenie</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <label for="exampleName" class="form-label">Email alebo Meno profilu</label>
                <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="jozkoMrkvicka555">
                <label for="inputPassword5" class="form-label">Heslo</label>
                <input type="password" id="inputPassword5" class="form-control" aria-describedby="passwordHelpBlock">
            </div>
            <div class="modal-footer d-flex flex-column align-items-center">
                <button type="button" class="btn btn-primary">Prihlásiť</button>
                <label for="exampleName" class="form-label">Nemáte účet? Zaregistrujte sa -> <a href="#">TU</a></label>
            </div>
            </div>
        </div>
    </div>

    <!--Reklamácia-->
    <div class="container">
        <br>
        <h1 class = "text-center highlight">RÝCHLA REKLAMÁCIA</h1>
        <br>
        <h4 class = "text-center highlight">Stalo sa niečo zakúpenému produktu? Vybav to tu a rýchlo!</h4>
        <div class="row">
            <div class="col mt-4">
            <!-- Ľavý stĺpec - formulár -->
                <div class="row">
                    <div class="col mb-2">
                        <label for="exampleName" class="form-label">Meno</label>
                        <input type="email" class="form-control" id="menoReklamanta" placeholder="Janko">
                    </div>
                    <div class="col mb-2">
                        <label for="exampleName" class="form-label">Priezvisko</label>
                        <input type="email" class="form-control" id="PriezviskoReklamanta" placeholder="Mrkvička">
                    </div>
                </div>
            <div class="mb-2">
                <label for="exampleName" class="form-label">ID objednávky</label>
                <input type="email" class="form-control" id="IDobjednavkyReklamanta" placeholder="001122334455">
            </div>
            <div class="mb-2">
                <label for="exampleName" class="form-label">Typ problému</label>
                <input type="email" class="form-control" id="TypProblemuReklamanta" placeholder="Rozbitie displeju">
            </div>
            <div class="mb-2">
                <label for="exampleName" class="form-label">Dôvod reklamácie</label>
                <textarea class="form-control" id="DovodReklamacieReklamanta" rows="4" placeholder="nepáči sa mi produkt"> </textarea>
            </div>
        </div>
            <!--Fotka reklamácie-->
            <div class="col-4 text-center">
                <img src="../resources/gallery.svg" class="w-75">
                <div class="mb-3">
                    <label for="formFile" class="form-label">Vložiť obrázok z PC</label>
                    <input class="form-control" type="file" id="formFile">
                </div>
            </div>
        </div>
        <div class="text-center"><button type="button" class="btn btn-secondary w-50 fw-bold">Potvrdiť reklamáciu</button></div>
    </div>

    <!-- Paticka -->
    <div class="container">
        <hr class="border-dark border-2 opacity-100 my-0 mt-3"/>
        <div class="paticka">
            <div class="container text-center">
                <div class="row">
                    <div class="col-12 col-md-8">
                        <div class="row">
                            <div class="col-6 col-md-4">
                                <p>Reklamácie</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Možnosti dopravy</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>O nás</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Záruky</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Zmluvné podmienky</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Kontakt</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-4 mt-3 mt-md-0">
                        Adresa
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JS z Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
