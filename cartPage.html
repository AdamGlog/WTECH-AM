<!doctype html>
<html lang="sk">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Nora</title>
        <!-- CSS z Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="styles.css" rel="stylesheet">
    </head>
  <body>
    
    <!--Top bar Stranky-->
    <div class="container">
        <div class="row align-items-center">
            <div class="col-2 top-logo">
                <img src="./resources/NoraLogo.png" width="157" height="114">
            </div>
            <div class="col-6">
                <input class="form-control me-2" type="search" placeholder="Search..." aria-label="Search"/>   
            </div>
            <div class="col-1">
                <button class="btn btn-outline-success our-buttons w-100" type="submit">
                    <img src="./resources/search.svg" height="40">
                </button>
            </div>
            <div class="col-1">
                <button type="button" class="btn btn-secondary our-buttons w-100">
                    <img src="./resources/profile.svg" height="40">
                </button>
            </div>
            <div class="col-1">
                <button type="button" class="btn btn-secondary our-buttons w-100">
                    <img src="./resources/ShopCart.svg" height="40">
                </button>
            </div>    
        </div>
    </div>

    <!--Menu kategorii-->
    <div class="container">
        <div class="row g-0">
            <div class="col">
                <div class="d-grid menu-button-left" role="group" aria-label="Basic example">
                <button id="first-menu-button" type="button" class="btn btn-secondary menu-buttons our-buttons">Hry</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                <button type="button" class="btn btn-secondary menu-buttons our-buttons">Konzoly</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                <button type="button" class="btn btn-secondary menu-buttons our-buttons">Merch</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                <button type="button" class="btn btn-secondary menu-buttons our-buttons">Figúrky</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid menu-button-right" role="group" aria-label="Basic example">
                <button id="last-menu-button" type="button" class="btn btn-secondary menu-buttons our-buttons">O Nás</button>
                </div>
            </div>    
        </div>
    </div>

    <div class="container text-center">
            <h3> Košík</h3>
        </div>

    <!-- Paticka -->
    <div class="container">
        <hr class="border-dark border-5"/>
        <div class="paticka">
            <div class="container text-center">
                <div class="row">
                    <div class="col">
                        <div class="row">
                            <div class="col">
                                <p style="text-align:center">Reklamácie</p>
                            </div>
                            <div class="col">
                                <p style="text-align:center">Možnosti dopravy</p>
                            </div>
                            <div class="col">
                                <p style="text-align:center">O nás</p>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col">
                                <p style="text-align:center">Záruky</p>
                            </div>
                            <div class="col">
                                <p style="text-align:center">Zmluvné podmienky</p>
                            </div>
                            <div class="col">
                                <p style="text-align:center">Kontakt</p>
                            </div>
                        </div>
                    </div>
                    <div class="col">
                        Adresa
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- JS z Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  
</body>
</html>
