<!doctype html>
<html lang="sk">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Nora</title>
        <!-- CSS z Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="./styles.css" rel="stylesheet">
    </head>
  <body>
    <!--Top bar Stranky-->
    <div class="container">
        <div class="row align-items-center">
            <div class="col-auto">
                <img src="./resources/NoraLogo.svg" class="top-logo">
            </div>
            <div class="col">
                <input id="search-area" class="form-control me-2" type="search" placeholder="Search..." aria-label="Search"/>   
            </div>
            <div class="col-auto">
                <button class="btn btn-outline-success our-buttons w-100 top-bar-sizes" type="submit">
                    <img src="./resources/search.svg" height="40">
                </button>
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-secondary our-buttons w-100 top-bar-sizes">
                    <img src="./resources/profile.svg" height="40">
                </button>
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-secondary our-buttons w-100 top-bar-sizes">
                    <img src="./resources/ShopCart.svg" height="40">
                </button>
            </div>    
        </div>
    </div>

    <!--Menu kategorii-->
    <div class="container">
        <div class="row g-0">
            <div class="col">
                <div class="d-grid menu-button-left" role="group" aria-label="Basic example">
                <button id="first-menu-button" type="button" class="btn btn-secondary menu-buttons our-buttons">Hry</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                <button type="button" class="btn btn-secondary menu-buttons our-buttons">Konzoly</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                <button type="button" class="btn btn-secondary menu-buttons our-buttons">Merch</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                <button type="button" class="btn btn-secondary menu-buttons our-buttons">Figúrky</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid menu-button-right" role="group" aria-label="Basic example">
                <button id="last-menu-button" type="button" class="btn btn-secondary menu-buttons our-buttons">O Nás</button>
                </div>
            </div>    
        </div>
    </div>

    <div class="container">
        <div class="row mt-4">
        <h3>Doprava a platba:</h3>
        <div class="border rounded p-3 bg-light">
            <div class="d-flex align-items-center gap-3 mb-4">
                <div class="d-flex align-items-center gap-2">
                <span class="step-circle active">1</span>
                <span class="step-label active">Košík</span>
                </div>
                <div class="step-line active"></div>
                <div class="d-flex align-items-center gap-2">
                    <span class="step-circle active">2</span>
                    <span class="step-label active">Doprava a platba</span>
                </div>
                <div class="step-line"></div>
                <div class="d-flex align-items-center gap-2">
                    <span class="step-circle">3</span>
                    <span class="step-label">Dodacie údaje</span>
                </div>
                <div class="step-line"></div>
                <div class="d-flex align-items-center gap-2">
                    <span class="step-circle">4</span>
                    <span class="step-label">Sumár</span>
                </div>
            </div>
        <div class="row">
            <div class="col">
                <div class="row">
                    <h4>Výber dopravy:</h4>
                </div> 
                <div class="btn-group-vertical w-75 p-3" role="group">
                <input type="radio" class="btn-check" name="doprava" id="doprava1" autocomplete="off" checked>
                <label class="btn btn-secondary" for="doprava1">Kuriér</label>

                <input type="radio" class="btn-check" name="doprava" id="doprava2" autocomplete="off">
                <label class="btn btn-secondary" for="doprava2">Pošta</label>

                <input type="radio" class="btn-check" name="doprava" id="doprava3" autocomplete="off">
                <label class="btn btn-secondary" for="doprava3">Predajňa</label>
            </div>
            </div>
            <div class="col">
                <div class="row">
                    <h4>Výber platby:</h4>
                </div> 
                <div class="btn-group-vertical w-75 p-3" role="group" aria-label="Vertical radio toggle button group">
                <input type="radio" class="btn-check" name="platba" id="platba1" autocomplete="off" checked>
                <label class="btn " for="platba1">Karta online</label>

                <input type="radio" class="btn-check" name="platba" id="platba2" autocomplete="off">
                <label class="btn " for="platba2">Bankový prevod</label>

                <input type="radio" class="btn-check" name="platba" id="platba3" autocomplete="off">
                <label class="btn " for="platba3">Na mieste</label>
                </div>

            </div>

            <!-- Pokračovať -->
            <div class="d-flex justify-content-end mt-2">
                <button class="btn btn-secondary">Pokračovať</button>
            </div>
        </div>
    </div>

     <!-- Paticka -->
    <div class="container">
        <hr class="border-dark border-2 opacity-100 my-0 mt-3"/>
        <div class="paticka">
            <div class="container text-center">
                <div class="row">
                    <div class="col">
                        <div class="row">
                            <div class="col">
                                <p style="text-align:center">Reklamácie</p>
                            </div>
                            <div class="col">
                                <p style="text-align:center">Možnosti dopravy</p>
                            </div>
                            <div class="col">
                                <p style="text-align:center">O nás</p>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col">
                                <p style="text-align:center">Záruky</p>
                            </div>
                            <div class="col">
                                <p style="text-align:center">Zmluvné podmienky</p>
                            </div>
                            <div class="col">
                                <p style="text-align:center">Kontakt</p>
                            </div>
                        </div>
                    </div>
                    <div class="col">
                        Adresa
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JS z Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
