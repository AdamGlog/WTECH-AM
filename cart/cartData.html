<!doctype html>
<html lang="sk">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Nora</title>
        <!-- CSS z Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="../styles.css" rel="stylesheet">
    </head>
  <body>
    <!--Top bar Stranky-->
    <div class="container">
        <div class="row align-items-center g-1">
            <div class="col-auto">
                <img src="../resources/NoraLogo.svg" class="top-logo">
            </div>
            <div class="col search-area">
                <input class="form-control me-2" type="search" placeholder="Search..." aria-label="Search"/>   
            </div>
            <div class="col-auto">
                <button class="btn btn-outline-success our-buttons top-bar-sizes" type="submit">
                    <img src="../resources/search.svg" class="top-bar-icons">
                </button>
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-secondary our-buttons top-bar-sizes">
                    <img src="../resources/profile.svg" class="top-bar-icons">
                </button>
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-secondary our-buttons top-bar-sizes">
                    <img src="../resources/ShopCart.svg" class="top-bar-icons">
                </button>
            </div>    
        </div>
    </div>

    <!--Menu kategorii-->
    <div class="container">
        <div class="row g-0">
            <div class="col">
                <div class="d-grid menu-button-left" role="group" aria-label="Basic example">
                <button id="first-menu-button" type="button" class="btn btn-secondary menu-buttons our-buttons">Hry</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                <button type="button" class="btn btn-secondary menu-buttons our-buttons">Konzoly</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                <button type="button" class="btn btn-secondary menu-buttons our-buttons">Merch</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                <button type="button" class="btn btn-secondary menu-buttons our-buttons">Figúrky</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid menu-button-right" role="group" aria-label="Basic example">
                <button id="last-menu-button" type="button" class="btn btn-secondary menu-buttons-last our-buttons">O Nás</button>
                </div>
            </div>    
        </div>
    </div>

    <div class="container">
        <div class="row mt-4">
        <h3>Dodacie údaje:</h3>
        <div class="border rounded p-3 bg-light">
            <div class="d-flex align-items-center gap-3 mb-4">
                <div class="d-flex align-items-center gap-2">
                <span class="step-circle active">1</span>
                <span class="step-label active">Košík</span>
                </div>
                <div class="step-line active"></div>
                <div class="d-flex align-items-center gap-2">
                    <span class="step-circle active">2</span>
                    <span class="step-label active">Doprava a platba</span>
                </div> 
                <div class="step-line active"></div>
                <div class="d-flex align-items-center gap-2">
                    <span class="step-circle active">3</span>
                    <span class="step-label active">Dodacie údaje</span>
                </div>
                <div class="step-line"></div>
                <div class="d-flex align-items-center gap-2">
                    <span class="step-circle">4</span>
                    <span class="step-label">Sumár</span>
                </div>
            </div>
            <div class="row">
                <div class="col-5">
                    <div class="mb-3">
                        <label for="meno" class="form-label">Meno</label>
                        <input type="text" class="form-control" id="meno">
                    </div>
                    <div class="mb-3">
                        <label for="priezvisko" class="form-label">Priezvisko</label>
                        <input type="text" class="form-control" id="priezvisko">
                    </div>
                </div>
                <div class="col-5">
                    <div class="mb-3">
                        <label for="ulica" class="form-label">Ulica</label>
                        <input type="text" class="form-control" id="meno">
                    </div>
                    <div class="mb-3">
                        <label for="mesto" class="form-label">Mesto</label>
                        <input type="text" class="form-control" id="priezvisko">
                    </div>
                    <div class = "mb-3">
                            <label for="krajina" class="form-label">Krajina</label>
                            <select class="form-select" aria-label="Default select example">
                            <option selected>Výber krajiny</option>
                            <option value="1">Slovensko</option>
                            <option value="2">Česko</option>
                            <option value="3">Poľsko</option>
                            </select>
                    </div>
                </div>
                <div class="col-2">
                    <div class="mb-3">
                        <label for="cislo-domu" class="form-label">Číslo domu</label>
                        <input type="text" class="form-control" id="meno">
                    </div>
                    <div class="mb-3">
                        <label for="psc" class="form-label">PSČ</label>
                        <input type="text" class="form-control" id="priezvisko">
                    </div>
                    <div class="mb-3 mt-5"><button class="btn btn-secondary  w-100">Vyplniť info z profilu</button></div>
                    
                </div>
            </div>
            <div class="d-flex justify-content-between mt-2">
                <button class="btn btn-secondary">Späť</button>
                <button class="btn btn-secondary">Pokračovať</button>
            </div>
        </div>
    </div>

<!-- Paticka -->
    <div class="container">
        <hr class="border-dark border-2 opacity-100 my-0 mt-3"/>
        <div class="paticka">
            <div class="container text-center">
                <div class="row">
                    <div class="col-12 col-md-8">
                        <div class="row">
                            <div class="col-6 col-md-4">
                                <p>Reklamácie</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Možnosti dopravy</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>O nás</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Záruky</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Zmluvné podmienky</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Kontakt</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-4 mt-3 mt-md-0">
                        Adresa
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JS z Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
