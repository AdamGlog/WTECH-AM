    <!-- Modálne okno - Prihlásenie -->
    <div class="modal fade" id="profil" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">Prihlásenie</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <label for="exampleName" class="form-label">Email alebo Meno profilu</label>
                <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="jozkoMrkvicka555">
                <label for="inputPassword5" class="form-label">Heslo</label>
                <input type="password" id="inputPassword5" class="form-control" aria-describedby="passwordHelpBlock">
            </div>
            <div class="modal-footer d-flex flex-column align-items-center">
                <button type="button" class="btn btn-primary">Prihlásiť</button>
                <label for="exampleName" class="form-label">Nemáte účet? Zaregistrujte sa -> <a href="../profile/registration.html">TU</a></label>
            </div>

                <div class="step-line"></div>
                <div class="d-flex align-items-center gap-2">
                    <span class="step-circle">4</span>
                    <span class="step-label">Sumár</span>

            </div>
            <div class="row">
                <div class="col-5">
                    <div class="mb-3">
                        <label for="meno" class="form-label">Meno</label>
                        <input type="text" class="form-control" id="meno">
                    </div>
                    <div class="mb-3">
                        <label for="priezvisko" class="form-label">Priezvisko</label>

                    <div class="mb-3">

                </div>
                <div class="col-5">
                    <div class="mb-3">
                        <label for="ulica" class="form-label">Ulica</label>
                        <input type="text" class="form-control" id="meno">
                    </div>
                    <div class="mb-3">
                        <label for="mesto" class="form-label">Mesto</label>
                        <input type="text" class="form-control" id="priezvisko">
                    </div>
                    <div class = "mb-3">
                            <label for="krajina" class="form-label">Krajina</label>

                            <option selected>Výber krajiny</option>
                            <option value="1">Slovensko</option>
                            <option value="2">Česko</option>
                            <option value="3">Poľsko</option>
                            </select>
                    </div>
                </div>
                <div class="col-2">
                    <div class="mb-3">
                        <label for="cislo-domu" class="form-label">Číslo domu</label>
                        <input type="text" class="form-control" id="meno">
                    </div>
                    <div class="mb-3">
                        <label for="psc" class="form-label">PSČ</label>
                        <input type="text" class="form-control" id="priezvisko">
                    </div>
                    <div class="mb-3 mt-5"><button class="btn btn-secondary  w-100">Vyplniť info z profilu</button></div>
                    
                </div>

            <div class="d-flex justify-content-between mt-2">
