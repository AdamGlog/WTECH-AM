<!doctype html>
<html lang="sk">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Nora</title>
        <!-- CSS z Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="styles.css" rel="stylesheet">
    </head>
  <body>
    
    <!--Top bar Stranky-->
    <div class="container">
        <div class="row align-items-center">
            <div class="col-auto">
                <div class="top-logo"></div>
            </div>
            <div class="col">
                <input id="search-area" class="form-control me-2" type="search" placeholder="Search..." aria-label="Search"/>   
            </div>
            <div class="col-auto">
                <button class="btn btn-outline-success our-buttons w-100 top-bar-sizes" type="submit">
                    <img src="./resources/search.svg" height="40">
                </button>
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-secondary our-buttons w-100 top-bar-sizes">
                    <img src="./resources/profile.svg" height="40">
                </button>
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-secondary our-buttons w-100 top-bar-sizes">
                    <img src="./resources/ShopCart.svg" height="40">
                </button>
            </div>    
        </div>
    </div>

    <div class="container">
        <div class="container text-center">
            <h2> Registrácia</h2>
        </div>
        



    </div>




    <!-- Paticka -->
    <div class="container">
        <hr class="border-dark border-5"/>
        <div class="paticka">
            <div class="container text-center">
                <div class="row">
                    <div class="col">
                        <div class="row">
                            <div class="col">
                                <p style="text-align:center">Reklamácie</p>
                            </div>
                            <div class="col">
                                <p style="text-align:center">Možnosti dopravy</p>
                            </div>
                            <div class="col">
                                <p style="text-align:center">O nás</p>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col">
                                <p style="text-align:center">Záruky</p>
                            </div>
                            <div class="col">
                                <p style="text-align:center">Zmluvné podmienky</p>
                            </div>
                            <div class="col">
                                <p style="text-align:center">Kontakt</p>
                            </div>
                        </div>
                    </div>
                    <div class="col">
                        Adresa
                    </div>
                </div>
            </div>
        </div>
    </div>  

    <!-- JS z Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  
</body>
</html>
