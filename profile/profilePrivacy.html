<!doctype html>
<html lang="sk">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Nora</title>
        <!-- CSS z Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="../styles.css" rel="stylesheet">
    </head>
  <body>
    <!--Top bar Stranky-->
    <div class="container">
        <div class="row align-items-center g-1">
            <div class="col-auto">
                <img src="../resources/NoraLogo.svg" class="top-logo">
            </div>
            <div class="col search-area">
                <input class="form-control me-2" type="search" placeholder="Search..." aria-label="Search"/>   
            </div>
            <div class="col-auto">
                <button class="btn btn-outline-success our-buttons top-bar-sizes" type="submit">
                    <img src="../resources/search.svg" class="top-bar-icons">
                </button>
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-secondary our-buttons top-bar-sizes">
                    <img src="../resources/profile.svg" class="top-bar-icons">
                </button>
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-secondary our-buttons top-bar-sizes">
                    <img src="../resources/ShopCart.svg" class="top-bar-icons">
                </button>
            </div>    
        </div>
    </div>
    <!-- Menu Profilu -->
    <div class="container">
        <div class="row g-0 flex-nowrap">
            <div class="col">
                <div class="d-grid menu-button-left" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons our-buttons profile-menu-buttons pe-2">Prehľad Účtu</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons our-buttons profile-menu-buttons">Objednávky</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons our-buttons profile-menu-buttons">Obľúbené</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons our-buttons profile-menu-buttons">Údaje</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid menu-button" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-secondary menu-buttons-last our-buttons profile-menu-buttons">Súkromie</button>
                </div>
            </div>
            <div class="col">
                <div class="d-grid menu-button-right" role="group" aria-label="Basic example">
                    <button type="button" class="btn btn-danger our-buttons-logout profile-menu-buttons">Odhlásiť</button>
                </div>
            </div>  
        </div>
    </div>


    <!-- Zmena Udajov o uzivatelovi -->
    <div class="container">
        <h2 class="heading p-3 ms-1 main-headings">Zmena osobných údajov profilu</h2>
        <div class="row align-items-center">
            <div class="col-4 text-center">
                <img src="../resources/AccountImage.svg" class="w-75">
                <div class="mb-3">
                    <label for="formFile" class="form-label smaller-text">Vložiť profilový obrázok</label>
                    <input class="form-control smaller-text" type="file" id="formFile">
                </div>
            </div>
            <div class="col-4 fs-4">
                <div class="mb-3">
                    <label for="exampleFormControlInputName" class="form-label smaller-text">Krstné Meno</label>
                    <input type="text" class="form-control smaller-text" id="exampleFormControlInputName" placeholder="Jožko">
                </div>
                <div class="mb-3">
                    <label for="exampleFormControlInputSurN" class="form-label smaller-text">Priezvisko</label>
                    <input type="text" class="form-control smaller-text" id="exampleFormControlInputSurN" placeholder="Hráško">
                </div>
                <div class="mb-3">
                    <label for="exampleFormControlInputTel" class="form-label smaller-text">Telefónne číslo</label>
                    <input type="tel" class="form-control smaller-text" id="exampleFormControlInputTel" placeholder="+421 555 555 555">
                </div>
                <div class="mb-3">
                    <label for="exampleFormControlInputEmail" class="form-label smaller-text">Email</label>
                    <input type="email" class="form-control smaller-text" id="exampleFormControlInputEmail" placeholder="janko.hrasko@gnail.com">
                </div>
            </div>
            <div class="col-3 fs-4">
                <div class="mb-3">
                    <label for="exampleFormControlInputStreet" class="form-label smaller-text">Ulica</label>
                    <input type="text" class="form-control smaller-text" id="exampleFormControlInputStreet" placeholder="Kukučínova 2025">
                </div>
                <div class="mb-3">
                    <label for="exampleFormControlInputHouseN" class="form-label smaller-text">Číslo Domu</label>
                    <input type="text" class="form-control smaller-text" id="exampleFormControlInputHouseN" placeholder="11">
                </div>
                <div class="mb-3">
                    <label for="exampleFormControlInputCity" class="form-label smaller-text">Mesto</label>
                    <input type="text" class="form-control smaller-text" id="exampleFormControlInputCity" placeholder="Snina">
                </div>
                <div class="mb-3">
                    <label for="exampleFormControlInputZipCode" class="form-label smaller-text">PSČ</label>
                    <input type="text" class="form-control smaller-text" id="exampleFormControlInputZipCode" placeholder="069 01">
                </div>
            </div>
        </div>
    </div>
    
    
    <!-- Paticka -->
    <div class="container">
        <hr class="border-dark border-2 opacity-100 my-0 mt-3"/>
        <div class="paticka">
            <div class="container text-center">
                <div class="row">
                    <div class="col-12 col-md-8">
                        <div class="row">
                            <div class="col-6 col-md-4">
                                <p>Reklamácie</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Možnosti dopravy</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>O nás</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Záruky</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Zmluvné podmienky</p>
                            </div>
                            <div class="col-6 col-md-4">
                                <p>Kontakt</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-4 mt-3 mt-md-0">
                        Adresa
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JS z Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
